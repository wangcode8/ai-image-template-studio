name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VITE_BASE_PATH: /ai-image-template-studio/
      VITE_APP_ID: ai-image-template-studio
      VITE_API_ENV: production
      VITE_LOGIN_TYPE: email
      VITE_SHOW_POLICY: false
      VITE_POLICY_PREFIX: ""
      VITE_PRIVACY_POLICY_URL: ""
      VITE_USER_POLICY_URL: ""
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: example-anon-key
      VITE_AI_GATEWAY_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
